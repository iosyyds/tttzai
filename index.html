<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>甜仔专属 | 三角洲行动</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            background: #080c10;
            font-family: "微软雅黑", sans-serif;
            overflow: hidden;
            color: #a9b9b3;
            position: relative;
        }

        #particles {
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        .bg-grid-new {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(#101a16 1px, transparent 1px),
                              linear-gradient(90deg, #101a16 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.3;
            z-index: 2;
        }

        .scan-flow {
            position: absolute;
            inset: 0;
            background: linear-gradient(transparent 47%, rgba(0,160,125,0.07) 53%, transparent);
            background-size: 100% 8px;
            animation: flowScan 8s linear infinite;
            z-index: 3;
        }
        @keyframes flowScan {
            0% { background-position: 0 0; }
            100% { background-position: 0 100%; }
        }

        .out-border {
            position: absolute;
            top: 30px;
            left: 30px;
            right: 30px;
            bottom: 30px;
            border: 1px solid rgba(0,160,125,0.25);
            z-index: 4;
        }
        .out-border::before,
        .out-border::after {
            content: '';
            position: absolute;
            width: 80px;
            height: 80px;
            border: 2px solid #00a07d;
        }
        .out-border::before {
            top: 0;
            left: 0;
            border-right: none;
            border-bottom: none;
            animation: cornerFlow 4s linear infinite;
        }
        .out-border::after {
            top: 0;
            right: 0;
            border-left: none;
            border-bottom: none;
            animation: cornerFlow 4s linear infinite;
        }
        .corner-bl, .corner-br {
            position: absolute;
            width: 80px;
            height: 80px;
            border: 2px solid #00a07d;
            bottom: 0;
            animation: cornerFlow 4s linear infinite;
        }
        .corner-bl { left: 0; border-top: none; border-right: none; }
        .corner-br { right: 0; border-top: none; border-left: none; }

        @keyframes cornerFlow {
            0% { box-shadow: 0 0 6px #00a07d; opacity: 0.6; }
            50% { box-shadow: 0 0 20px #00a07d; opacity: 1; }
            100% { box-shadow: 0 0 6px #00a07d; opacity: 0.6; }
        }

        .top-bar {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,160,125,0.1);
            padding: 6px 30px;
            border-radius: 4px;
            border: 1px solid rgba(0,160,125,0.2);
            font-size: 14px;
            color: #729486;
            letter-spacing: 2px;
            z-index: 5;
            animation: barPulse 3s ease-in-out infinite;
        }
        @keyframes barPulse {
            0%,100% { box-shadow: 0 0 5px rgba(0,160,125,0.15); }
            50% { box-shadow: 0 0 15px rgba(0,160,125,0.3); }
        }

        .main-console {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            padding: 60px 40px;
            background: linear-gradient(135deg, rgba(6,12,17,0.9), rgba(9,15,20,0.7));
            border: 1px solid rgba(0,160,125,0.3);
            clip-path: polygon(30px 0, 100% 0, 100% 30px, calc(100% - 30px) 100%, 0 100%, 0 calc(100% - 30px));
            box-shadow: 0 0 50px rgba(0,160,125,0.15);
            text-align: center;
            z-index: 6;
            animation: panelGlow 5s ease-in-out infinite alternate;
        }
        @keyframes panelGlow {
            0% { box-shadow: 0 0 30px rgba(0,160,125,0.1); }
            100% { box-shadow: 0 0 60px rgba(0,160,125,0.25); }
        }

        .title-name {
            font-size: 44px;
            letter-spacing: 12px;
            color: #00b98f;
            font-weight: 600;
            margin-bottom: 35px;
            animation: titleBreath 2.5s ease-in-out infinite alternate;
        }
        @keyframes titleBreath {
            0% { text-shadow: 0 0 12px #00b98f; }
            100% { text-shadow: 0 0 25px #00b98f, 0 0 40px rgba(0,160,125,0.5); }
        }

        .date-show {
            font-size: 17px;
            color: #648275;
            letter-spacing: 3px;
            margin-bottom: 25px;
        }

        .time-show {
            font-size: 76px;
            color: #00c99c;
            font-weight: bold;
            letter-spacing: 6px;
            position: relative;
            animation: timeGlitch 4s infinite;
        }
        @keyframes timeGlitch {
            0%, 100% { opacity: 1; }
            99% { opacity: 0.95; text-shadow: 0 0 15px #00c99c; }
        }
        .time-show::after {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            width: 100%;
            height: 2px;
            background: rgba(0,200,155,0.25);
            animation: glitchLine 3s linear infinite;
        }
        @keyframes glitchLine {
            0% { transform: translateY(-50%) scaleX(0.7); opacity: 0.2; }
            50% { transform: translateY(-50%) scaleX(1); opacity: 0.5; }
            100% { transform: translateY(-50%) scaleX(0.7); opacity: 0.2; }
        }

        .new-radar {
            position: absolute;
            bottom: 90px;
            left: 90px;
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 1.5px solid rgba(0,160,125,0.4);
            background: radial-gradient(circle, rgba(0,160,125,0.12) 0%, transparent 70%);
            z-index: 5;
        }
        .new-radar::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: conic-gradient(from 0deg, transparent 70%, rgba(0,180,140,0.6) 100%);
            animation: radarRotate 3.5s linear infinite;
        }
        .new-radar::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0,180,140,0.3) 1px, transparent 1px);
            background-size: 10% 10%;
            animation: radarDot 6s linear infinite;
            z-index: -1;
        }
        @keyframes radarRotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes radarDot {
            0% { transform: scale(0.95); opacity: 0.5; }
            50% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.5; }
        }

        .side-mark {
            position: absolute;
            right: 50px;
            top: 50%;
            transform: translateY(-50%);
            writing-mode: vertical-rl;
            font-size: 14px;
            color: #5a776b;
            letter-spacing: 4px;
            z-index: 5;
        }

        .bottom-scroll {
            position: absolute;
            bottom: 55px;
            left: 50%;
            transform: translateX(-50%);
            width: 650px;
            overflow: hidden;
            height: 24px;
            z-index: 5;
        }
        .scroll-text {
            font-size: 13px;
            color: #00a07d;
            letter-spacing: 1px;
            white-space: nowrap;
            animation: scrollMove 16s linear infinite;
        }
        @keyframes scrollMove {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        .footer-wx {
            position: absolute;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 15px;
            color: #4a6358;
            letter-spacing: 2px;
            z-index: 6;
            opacity: 0.8;
            animation: wxBreath 4s ease-in-out infinite;
        }
        @keyframes wxBreath {
            0%,100% { opacity: 0.7; }
            50% { opacity: 1; }
        }

        .light-point {
            position: absolute;
            top: 42px;
            right: 100px;
            width: 10px;
            height: 10px;
            background: #ff3b3b;
            border-radius: 50%;
            box-shadow: 0 0 12px #ff3b3b;
            animation: pointBlink 1.2s infinite;
            z-index: 5;
        }
        @keyframes pointBlink {
            0%,100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.2; transform: scale(0.8); }
        }

        .pulse-ripple {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 400px;
            height: 400px;
            transform: translate(-50%,-50%);
            border: 1px solid rgba(0,160,125,0.15);
            border-radius: 50%;
            animation: pulseRipple 6s ease-out infinite;
            z-index: 1;
        }
        .pulse-ripple2 {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 500px;
            height: 500px;
            transform: translate(-50%,-50%);
            border: 1px solid rgba(0,160,125,0.1);
            border-radius: 50%;
            animation: pulseRipple2 8s ease-out infinite;
            z-index: 1;
        }
        @keyframes pulseRipple {
            0% { transform: translate(-50%,-50%) scale(0.7); opacity: 0.8; }
            100% { transform: translate(-50%,-50%) scale(1.6); opacity: 0; }
        }
        @keyframes pulseRipple2 {
            0% { transform: translate(-50%,-50%) scale(0.6); opacity: 0.6; }
            100% { transform: translate(-50%,-50%) scale(1.8); opacity: 0; }
        }
    </style>
</head>
<body>
    <div id="particles"></div>
    <div class="pulse-ripple"></div>
    <div class="pulse-ripple2"></div>

    <div class="bg-grid-new"></div>
    <div class="scan-flow"></div>

    <div class="out-border">
        <div class="corner-bl"></div>
        <div class="corner-br"></div>
    </div>

    <div class="top-bar">三角洲行动 · 战术时钟系统</div>
    <div class="light-point"></div>
    <div class="side-mark">TACTICAL TERMINAL</div>

    <div class="main-console">
        <div class="title-name">甜仔专属</div>
        <div class="date-show" id="dateBox"></div>
        <div class="time-show" id="timeBox">00:00:00</div>
    </div>

    <div class="new-radar"></div>

    <div class="bottom-scroll">
        <div class="scroll-text">战术链路已连通 ● 卫星时钟同步成功 ● 区域环境监测正常 ● 作战终端待机运行 ● 加密频道持续值守</div>
    </div>

    <div class="footer-wx">微信 NBIOSS</div>

    <script>
        function upTime() {
            const n = new Date();
            let y = n.getFullYear();
            let m = String(n.getMonth()+1).padStart(2,'0');
            let d = String(n.getDate()).padStart(2,'0');
            let week = ['周日','周一','周二','周三','周四','周五','周六'][n.getDay()];

            let h = String(n.getHours()).padStart(2,'0');
            let mi = String(n.getMinutes()).padStart(2,'0');
            let s = String(n.getSeconds()).padStart(2,'0');

            document.getElementById('dateBox').innerText = `${y}-${m}-${d} ${week}`;
            document.getElementById('timeBox').innerText = `${h}:${mi}:${s}`;
        }
        setInterval(upTime,1000);
        upTime();

        const particleContainer = document.getElementById('particles');
        const particleCount = 60;
        for(let i = 0; i < particleCount; i++){
            let p = document.createElement('div');
            p.style.cssText = `
                position:absolute;
                width:${Math.random()*3+1}px;
                height:${Math.random()*3+1}px;
                background:rgba(0,180,140,${Math.random()*0.4+0.1});
                border-radius:50%;
                left:${Math.random()*100}%;
                top:${Math.random()*100}%;
                z-index:1;
                pointer-events:none;
                animation:floatMove ${Math.random()*10+8}s linear infinite;
            `;
            particleContainer.appendChild(p);
        }

        const style = document.createElement('style');
        style.textContent = `
            @keyframes floatMove {
                0% { transform: translateY(0) translateX(0); }
                50% { transform: translateY(-80px) translateX(20px); }
                100% { transform: translateY(0) translateX(0); }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
