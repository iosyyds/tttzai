<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>甜仔专属 | 三角洲行动</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,body {
            width: 100%;
            height: 100%;
            background: #080c10;
            font-family: sans-serif;
            overflow: hidden;
            color: #a9b9b3;
            position: relative;
        }

        /* 粒子背景 */
        #particles {
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }
        .bg-grid-new {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(#101a16 1px, transparent 1px),
                              linear-gradient(90deg, #101a16 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.3;
            z-index: 2;
        }
        .scan-flow {
            position: absolute;
            inset: 0;
            background: linear-gradient(transparent 47%, rgba(0,160,125,0.07) 50%, transparent);
            background-size: 100% 8px;
            animation: flowScan 8s linear infinite;
            z-index: 3;
        }
        @keyframes flowScan {
            0% { background-position: 0 0; }
            100% { background-position: 0 100%; }
        }

        /* 外框 */
        .out-border {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            bottom: 15px;
            border: 1px solid rgba(0,160,125,0.2);
            z-index: 4;
        }

        /* 手机端自动隐藏多余元素 */
        @media (max-width: 768px) {
            .top-bar, .light-point, .side-mark, .new-radar, .pulse-ripple, .pulse-ripple2, .corner-bl, .corner-br {
                display: none !important;
            }
            .out-border::before, .out-border::after {
                display: none !important;
            }
        }

        /* 核心中央框 —— 手机电脑都完美 */
        .main-console {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 88%;
            max-width: 460px;
            padding: 35px 20px;
            background: rgba(10,15,20,0.5);
            border: 1px solid rgba(0,160,125,0.3);
            border-radius: 14px;
            text-align: center;
            z-index: 6;
            animation: panelGlow 4s infinite alternate;
        }
        @keyframes panelGlow {
            0% { box-shadow: 0 0 20px rgba(0,160,125,0.1); }
            100% { box-shadow: 0 0 40px rgba(0,160,125,0.15); }
        }

        .title-name {
            font-size: clamp(26px, 7vw, 38px);
            letter-spacing: 6px;
            color: #00b98f;
            font-weight: 600;
            margin-bottom: 18px;
            animation: titleBreath 2.5s infinite alternate;
        }
        @keyframes titleBreath {
            0% { text-shadow: 0 0 10px #00b98f; }
            100% { text-shadow: 0 0 22px #00b98f; }
        }

        .date-show {
            font-size: clamp(13px, 3.5vw, 16px);
            color: #648275;
            margin-bottom: 18px;
            letter-spacing: 1px;
        }

        .time-show {
            font-size: clamp(40px, 13vw, 64px);
            color: #00c99c;
            font-weight: bold;
            letter-spacing: 2px;
        }

        /* 底部滚动条 */
        .bottom-scroll {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            height: 20px;
            overflow: hidden;
            z-index: 5;
        }
        .scroll-text {
            font-size: 11px;
            color: #00a07d;
            white-space: nowrap;
            animation: scrollMove 18s linear infinite;
        }
        @keyframes scrollMove {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        /* 底部微信 */
        .footer-wx {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: clamp(12px, 3.5vw, 14px);
            color: #5a776b;
            z-index: 6;
            opacity: 0.8;
            white-space: nowrap;
        }

    </style>
</head>
<body>
    <div id="particles"></div>
    <div class="bg-grid-new"></div>
    <div class="scan-flow"></div>
    <div class="out-border">
        <div class="corner-bl"></div>
        <div class="corner-br"></div>
    </div>

    <div class="main-console">
        <div class="title-name">甜仔专属</div>
        <div class="date-show" id="dateBox"></div>
        <div class="time-show" id="timeBox">00:00:00</div>
    </div>

    <div class="bottom-scroll">
        <div class="scroll-text">战术链路已连通 ● 卫星时钟同步成功 ● 区域环境监测正常 ● 作战终端待机运行</div>
    </div>

    <div class="footer-wx">微信 NBIOSS</div>

    <script>
        // 时间同步
        function upTime() {
            const n = new Date();
            let y = n.getFullYear();
            let m = String(n.getMonth()+1).padStart(2,'0');
            let d = String(n.getDate()).padStart(2,'0');
            let week = ['周日','周一','周二','周三','周四','周五','周六'][n.getDay()];
            let h = String(n.getHours()).padStart(2,'0');
            let mi = String(n.getMinutes()).padStart(2,'0');
            let s = String(n.getSeconds()).padStart(2,'0');
            document.getElementById('dateBox').innerText = `${y}-${m}-${d} ${week}`;
            document.getElementById('timeBox').innerText = `${h}:${mi}:${s}`;
        }
        setInterval(upTime,1000);
        upTime();

        // 粒子效果
        const p = document.getElementById('particles');
        for(let i=0;i<30;i++){
            let d = document.createElement('div');
            d.style.cssText = `
                position:absolute;
                width:${Math.random()*2+1}px;
                height:${Math.random()*2+1}px;
                background:rgba(0,180,140,${Math.random()*0.3+0.1});
                border-radius:50%;
                left:${Math.random()*100}%;
                top:${Math.random()*100}%;
                animation:float ${Math.random()*10+6}s infinite;
            `;
            p.appendChild(d);
        }
        const style = document.createElement('style');
        style.textContent = '@keyframes float{0%{transform:translate(0,0)}50%{transform:translate(0,-40px)}100%{transform:translate(0,0)}}';
        document.head.appendChild(style);
    </script>
</body>
</html>
