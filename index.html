<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>北京时间 · 甜仔专属</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 加密锁屏层 */
        .lock-wrap {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        .lock-wrap h2 {
            color: #7ed8a8;
            margin-bottom: 30px;
            letter-spacing: 4px;
        }
        .lock-wrap input {
            padding: 12px 20px;
            width: 260px;
            background: rgba(255,255,255,0.1);
            border: 1px solid #7ed8a8;
            border-radius: 8px;
            color: #fff;
            text-align: center;
            font-size: 16px;
            outline: none;
        }
        .lock-wrap button {
            margin-top: 20px;
            padding: 10px 30px;
            background: #07bd63;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        .main-page {
            display: none;
            width: 100vw;
            height: 100vh;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        body {
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #071015 0%, #0f1f18 100%);
            overflow: hidden;
        }

        body::before {
            content: "";
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(7, 189, 99, 0.15);
            border-radius: 50%;
            filter: blur(80px);
            top: 10%;
            left: 15%;
        }
        body::after {
            content: "";
            position: absolute;
            width: 250px;
            height: 250px;
            background: rgba(0, 160, 80, 0.12);
            border-radius: 50%;
            filter: blur(70px);
            bottom: 15%;
            right: 15%;
        }

        /* 顶部大标题 放大居中 */
        .top-title {
            font-size: 42px;
            color: #96e0bc;
            letter-spacing: 12px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        /* 央视小字 居中 */
        .cctv-tip {
            font-size: 18px;
            color: #7ed8a8;
            letter-spacing: 6px;
            margin-bottom: 40px;
        }

        /* 玻璃时间卡片 居中 */
        .glass-card {
            z-index: 10;
            padding: 60px 80px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .title {
            font-size: 16px;
            color: #7ed8a8;
            letter-spacing: 8px;
            margin-bottom: 30px;
        }

        .time {
            font-size: 76px;
            font-weight: 600;
            color: #ffffff;
            letter-spacing: 6px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(7, 189, 99, 0.4);
        }

        .date {
            font-size: 20px;
            color: #b2e2cc;
            letter-spacing: 2px;
        }

        /* 底部微信 整体居中 */
        .wx-footer {
            position: absolute;
            bottom: 8%;
            font-size: 16px;
            color: rgba(180, 230, 200, 0.6);
            letter-spacing: 3px;
        }

        @media (max-width: 768px) {
            .glass-card {
                padding: 40px 30px;
            }
            .time {
                font-size: 44px;
            }
            .top-title {
                font-size: 30px;
            }
            .cctv-tip {
                font-size: 15px;
                margin-bottom: 30px;
            }
        }
    </style>
</head>
<body>
    <!-- 加密锁屏 -->
    <div class="lock-wrap" id="lockPage">
        <h2>请输入访问密码</h2>
        <input type="password" id="pwdInput" placeholder="输入密码">
        <button onclick="checkPwd()">确认进入</button>
    </div>

    <!-- 主页面 全部整体居中 -->
    <div class="main-page" id="mainPage">
        <div class="top-title">甜仔专属</div>

        <div class="glass-card">
            <div class="title">北 京 时 间</div>
            <div class="time" id="clock">00:00:00</div>
            <div class="date" id="dateInfo">2026年04月30日 星期四</div>
        </div>

        <div class="wx-footer">微信：NBIOSS</div>
    </div>

    <script>
        // 密码可自行修改
        const passWord = "123456";

        function checkPwd() {
            let input = document.getElementById("pwdInput").value;
            if(input === passWord){
                document.getElementById("lockPage").style.display = "none";
                document.getElementById("mainPage").style.display = "flex";
            }else{
                alert("密码错误，请重新输入");
                document.getElementById("pwdInput").value = "";
            }
        }

        // 回车快捷登录
        document.getElementById("pwdInput").addEventListener("keydown",function(e){
            if(e.key === "Enter") checkPwd();
        });

        // 时间更新
        function updateTime() {
            const now = new Date();
            let h = String(now.getHours()).padStart(2, '0');
            let m = String(now.getMinutes()).padStart(2, '0');
            let s = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').innerText = `${h}:${m}:${s}`;

            const y = now.getFullYear();
            const M = String(now.getMonth() + 1).padStart(2, '0');
            const d = String(now.getDate()).padStart(2, '0');
            const weekArr = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
            const week = weekArr[now.getDay()];
            document.getElementById('dateInfo').innerText = `${y}年${M}月${d}日 ${week}`;
        }

        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
