<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>甜仔专属</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #050709;
            font-family: "Segoe UI", "微软雅黑", sans-serif;
            color: #d6e0db;
            position: relative;
        }

        /* 全局网格背景 三角洲战术网格 */
        .bg-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(18, 38, 32, 0.3) 1px, transparent 1px),
                linear-gradient(90deg, rgba(18, 38, 32, 0.3) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 1;
        }

        /* 全屏扫描流光 */
        .scan-line {
            position: absolute;
            top: -100%;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to bottom,
                transparent,
                rgba(0, 210, 160, 0.15),
                transparent
            );
            animation: scanMove 4s linear infinite;
            z-index: 2;
        }

        @keyframes scanMove {
            0% { top: -100%; }
            100% { top: 100%; }
        }

        /* 四角战术边框 */
        .corner-border {
            position: absolute;
            top: 30px;
            left: 30px;
            right: 30px;
            bottom: 30px;
            border: 1px solid rgba(0, 210, 160, 0.2);
            z-index: 3;
        }
        .corner-border::before,
        .corner-border::after {
            content: '';
            position: absolute;
            width: 40px;
            height: 40px;
            border-color: #00d2a0;
            border-style: solid;
            border-width: 2px 0 0 2px;
            top: -1px;
            left: -1px;
        }
        .corner-border::after {
            border-width: 2px 2px 0 0;
            left: auto;
            right: -1px;
        }
        .corner-border .bot-l {
            position: absolute;
            width: 40px;
            height: 40px;
            border: solid #00d2a0;
            border-width: 0 0 2px 2px;
            bottom: -1px;
            left: -1px;
        }
        .corner-border .bot-r {
            position: absolute;
            width: 40px;
            height: 40px;
            border: solid #00d2a0;
            border-width: 0 2px 2px 0;
            bottom: -1px;
            right: -1px;
        }

        /* 主容器 */
        .main-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(8, 12, 15, 0.85);
            border: 1px solid rgba(0, 210, 160, 0.3);
            padding: 60px 100px;
            clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
            box-shadow: 0 0 30px rgba(0, 210, 160, 0.2), inset 0 0 40px rgba(0, 210, 160, 0.05);
            text-align: center;
            z-index: 4;
        }

        /* 标题 甜仔专属 */
        .title {
            font-size: 42px;
            letter-spacing: 8px;
            color: #00d2a0;
            font-weight: 700;
            text-shadow: 0 0 12px rgba(0, 210, 160, 0.6);
            margin-bottom: 35px;
            animation: titleGlow 2s ease-in-out infinite alternate;
        }

        @keyframes titleGlow {
            from { text-shadow: 0 0 10px #00d2a0; }
            to { text-shadow: 0 0 25px #00d2a0, 0 0 40px rgba(0, 210, 160, 0.5); }
        }

        /* 北京时间 */
        .time-box {
            font-size: 72px;
            letter-spacing: 4px;
            color: #22e5c8;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(34, 229, 200, 0.7);
            margin: 20px 0;
        }

        .date-box {
            font-size: 20px;
            color: #88a89c;
            letter-spacing: 3px;
            margin-bottom: 20px;
        }

        /* 底部微信 */
        .footer-txt {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 20px;
            color: #7a998c;
            letter-spacing: 4px;
            text-shadow: 0 0 8px rgba(0, 210, 160, 0.2);
            z-index: 5;
        }

        /* 闪烁红点战术元素 */
        .blink-dot {
            position: absolute;
            top: 35px;
            right: 50px;
            width: 8px;
            height: 8px;
            background: #ff3c3c;
            border-radius: 50%;
            box-shadow: 0 0 10px #ff3c3c;
            animation: blink 1.2s infinite;
            z-index: 5;
        }
        @keyframes blink {
            0%,100% { opacity: 1; }
            50% { opacity: 0.2; }
        }
    </style>
</head>
<body>
    <!-- 背景网格 -->
    <div class="bg-grid"></div>
    <!-- 扫描线 -->
    <div class="scan-line"></div>
    <!-- 四角战术边框 -->
    <div class="corner-border">
        <div class="bot-l"></div>
        <div class="bot-r"></div>
    </div>
    <!-- 闪烁战术红点 -->
    <div class="blink-dot"></div>

    <!-- 主内容 -->
    <div class="main-box">
        <div class="title">甜仔专属</div>
        <div class="date-box" id="dateStr"></div>
        <div class="time-box" id="timeStr">00:00:00</div>
    </div>

    <!-- 底部文字 -->
    <div class="footer-txt">微信 NBIOSS</div>

    <script>
        // 更新北京时间 日期+时间
        function updateClock() {
            const now = new Date();
            // 日期
            const year = now.getFullYear();
            const mon = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const weekArr = ['周日','周一','周二','周三','周四','周五','周六'];
            const week = weekArr[now.getDay()];
            document.getElementById('dateStr').innerText = `${year}-${mon}-${day} ${week}`;

            // 时间
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('timeStr').innerText = `${h}:${m}:${s}`;
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
